<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      .lv-fav-pulse {
        animation: lv-fav-pulse-anim 1.6s ease-in-out infinite;
        transform-origin: 47px 17px;
      }
      @keyframes lv-fav-pulse-anim {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.55; transform: scale(0.82); }
      }
    </style>
  </defs>

  <!-- Theatre-dark backing circle -->
  <circle cx="32" cy="32" r="32" fill="#0E0B12"/>

  <!-- Subtle inner ring, like a screen bezel -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#2A2433" stroke-width="2"/>

  <!-- Play triangle: the streaming / watch symbol -->
  <path d="M24 19 L46 32 L24 45 Z" fill="#F5EFE3"/>

  <!-- Broadcast waves arcing off the play button, signalling "live" transmission -->
  <path d="M40 24 A11 11 0 0 1 40 40" fill="none" stroke="#FF5A3C" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M44.5 19.5 A18 18 0 0 1 44.5 44.5" fill="none" stroke="#FF5A3C" stroke-width="2.6" stroke-linecap="round" opacity="0.55"/>

  <!-- Pulsing live bulb / marquee dot -->
  <circle class="lv-fav-pulse" cx="47" cy="17" r="5.5" fill="#FF5A3C"/>
  <circle cx="47" cy="17" r="5.5" fill="none" stroke="#0E0B12" stroke-width="1.5"/>
</svg>